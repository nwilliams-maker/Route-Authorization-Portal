<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Route Authorization Portal | Terraboost</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --tb-purple: #633094; 
            --tb-green: #76bc21; 
            --tb-light-blue: #e6f0fa; /* The Light Blue you requested */
            --tb-bg: #f4f5f7; 
            --dark-text: #1e293b;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: var(--tb-bg); 
            margin: 0; 
            padding: 20px; 
            color: var(--dark-text); 
        }

        .container { 
            max-width: 600px; 
            margin: 0 auto; 
            background: white; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            overflow: hidden; /* Important for header color to reach corners */
            border-top: 8px solid var(--tb-purple); 
        }

        /* LIGHT BLUE HEADER AREA */
        .header { 
            background-color: var(--tb-light_blue); 
            padding: 30px; 
            text-align: center; 
            border-bottom: 1px solid #d0d4e4;
        }

        .header h2 { 
            color: var(--tb-purple); 
            margin: 0; 
            font-weight: 800;
            font-size: 24px;
        }

        .header p { 
            margin: 10px 0 0 0; 
            color: var(--dark-text); 
            font-weight: 400;
        }

        .content-body { padding: 30px; }

        .route-card { 
            background: #ffffff; 
            border: 2px solid var(--tb-light_blue); 
            border-radius: 8px; 
            margin-bottom: 25px; 
            overflow: hidden;
        }

        /* Sub-header inside the card also Light Blue */
        .card-label-bar {
            background-color: var(--tb-light_blue);
            padding: 8px 15px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: var(--tb-purple);
            letter-spacing: 1px;
        }

        .data-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 15px; 
            border-bottom: 1px solid #f0f0f0; 
        }

        .data-row:last-child { border-bottom: none; }

        .data-label { font-weight: 700; color: #64748b; text-transform: uppercase; font-size: 12px; }
        .data-value { font-weight: 700; color: var(--dark-text); font-size: 16px; }

        /* VIBRANT GREEN BUTTON (Non-Dark) */
        .auth-btn { 
            width: 100%; 
            background: var(--tb-green); 
            color: white; 
            border: none; 
            padding: 20px; 
            font-size: 18px; 
            font-weight: 700; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(118, 188, 33, 0.2);
        }

        .auth-btn:hover { 
            background: #619a1b; 
            transform: translateY(-2px); 
            box-shadow: 0 6px 12px rgba(118, 188, 33, 0.3);
        }

        .auth-btn:active { transform: translateY(0); }
        .auth-btn:disabled { background: #cbd5e1; cursor: not-allowed; box-shadow: none; }

        #status-msg { margin-top: 15px; text-align: center; font-weight: 700; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--tb-purple); border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>Route Authorization</h2>
        <p>Work Order Review & Approval</p>
    </div>

    <div class="content-body">
        <div id="loading">
            <div class="loader"></div>
            <p style="text-align:center;">Validating route with server...</p>
        </div>

        <div id="content" class="hidden">
            <div class="route-card">
                <div class="card-label-bar">Contractor Details</div>
                <div class="data-row">
                    <span class="data-label">Name</span>
                    <span class="data-value" id="val-name">---</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Work Order</span>
                    <span class="data-value" id="val-wo">---</span>
                </div>
                <div class="card-label-bar">Financial Summary</div>
                <div class="data-row">
                    <span class="data-label">Total Stops</span>
                    <span class="data-value" id="val-stops">---</span>
                </div>
                <div class="data-row">
                    <span class="data-label">Route Compensation</span>
                    <span class="data-value" style="color: var(--tb-green); font-size: 20px;" id="val-pay">$0.00</span>
                </div>
            </div>

            <button id="authorize-btn" class="auth-btn">APPROVE & AUTHORIZE ROUTE</button>
            <div id="status-msg"></div>
        </div>

        <div id="error-view" class="hidden" style="text-align: center; color: #ef4444; padding: 20px;">
            <p style="font-size: 40px; margin: 0;">⚠️</p>
            <p><strong>Route Not Found</strong></p>
            <p>This link may have expired or is invalid. Please contact dispatch.</p>
        </div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbynAIziubArSQ0hVGTvJMpk11a9yLP0kNcSmGpcY7GDNRT25Po5p92K3EDslx9VycKC/exec";
    const params = new URLSearchParams(window.location.search);
    const routeId = params.get('route');

    async function init() {
        if (!routeId) { showError(); return; }

        try {
            const response = await fetch(`${GAS_URL}?action=getRoute&routeId=${routeId}`);
            const data = await response.json();

            if (data.success) {
                document.getElementById('val-name').innerText = data.route.icName;
                document.getElementById('val-wo').innerText = data.route.workOrder;
                document.getElementById('val-stops').innerText = data.route.stopCount;
                document.getElementById('val-pay').innerText = `$${parseFloat(data.route.compensation).toFixed(2)}`;
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } else { showError(); }
        } catch (e) { showError(); }
    }

    document.getElementById('authorize-btn').addEventListener('click', async () => {
        const btn = document.getElementById('authorize-btn');
        const msg = document.getElementById('status-msg');
        btn.disabled = true;
        btn.innerText = "AUTHORIZING...";

        try {
            const response = await fetch(GAS_URL, {
                method: 'POST',
                body: JSON.stringify({ action: 'authorizeRoute', routeId: routeId })
            });
            const result = await response.json();

            if (result.success) {
                msg.style.color = "var(--tb-green)";
                msg.innerText = "✅ Authorized! You may now close this window.";
                btn.innerText = "SUCCESSFULLY AUTHORIZED";
            } else { throw new Error(); }
        } catch (e) {
            msg.style.color = "#ef4444";
            msg.innerText = "❌ System Error. Please try again.";
            btn.disabled = false;
            btn.innerText = "APPROVE & AUTHORIZE ROUTE";
        }
    });

    function showError() {
        document.getElementById('loading').classList.add('hidden');
        document.getElementById('error-view').classList.remove('hidden');
    }

    init();
</script>

</body>
</html>
